<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ページが見つかりません — こども新聞</title>
<style>
  :root { --paper:#f5f2ea; --ink:#1f1c17; --sub:#6f6a5e; --rule:#d9d2c0; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--paper); color:var(--ink); font-family:"Hiragino Mincho ProN","Yu Mincho",serif; line-height:1.9; }
  .wrap { max-width:640px; margin:0 auto; padding:96px 24px 80px; text-align:center; }
  .masthead { font-size:28px; font-weight:800; letter-spacing:.28em; padding-bottom:20px; border-bottom:3px double var(--ink); }
  .lede { margin-top:36px; font-size:18px; font-weight:700; letter-spacing:.06em; }
  p { margin-top:14px; font-size:14px; color:var(--sub); }
  footer { margin-top:56px; padding-top:20px; border-top:1px solid var(--rule); font-size:12px; color:var(--sub); }
  footer a { color:var(--sub); }
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">こども新聞</div>
  <p class="lede">おさがしのページは見つかりませんでした</p>
  <p>紙面は、招待されたご家族だけがアプリの中でご覧になれます。</p>
  <footer>
    <p><a href="/">ホーム</a> ・ <a href="/privacy/">プライバシーポリシー</a> ・ <a href="/support/">サポート</a></p>
  </footer>
</div>
</body>
</html>
